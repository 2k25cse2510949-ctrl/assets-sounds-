<!DOCTYPE html>
<html>

<head>

<title>Ambient Sound Mixer</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:linear-gradient(270deg,#020617,#0f172a,#1e293b);
background-size:600% 600%;
animation:bgMove 15s ease infinite;
overflow-x:hidden;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
padding:25px;
font-size:40px;
text-shadow:0 0 10px black;
}

.sound-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:30px;
}

.sound-card{
background:rgba(30,41,59,0.9);
border-radius:15px;
padding:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
transition:0.3s;
}

.sound-card:hover{
transform:scale(1.07);
box-shadow:0 0 20px #22c55e;
}

.sound-card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.sound-card p{
margin:10px 0;
font-weight:bold;
font-size:18px;
}

.playbtn{
background:#22c55e;
border:none;
padding:8px 15px;
border-radius:8px;
cursor:pointer;
margin-bottom:8px;
}

.playbtn:hover{
background:#16a34a;
}

.volume{
width:100%;
}

.nowplaying{
display:none;
color:#22c55e;
font-size:14px;
}

/* Falling Leaves */

.leaf{
position:fixed;
top:-50px;
font-size:24px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-50px) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(100vh) rotate(360deg);
opacity:0;
}
}

</style>

</head>

<body>

<h1>🌿 Ambient Sound Mixer</h1>

<div class="sound-container">

<!-- Rain -->

<div class="sound-card">
<img src="https://images.unsplash.com/photo-1500375592092-40eb2168fd21">
<p>Rain</p>
<span class="nowplaying">Now Playing</span>
<audio>
<source src="black_kumuzhi-lofi-ambient-bell-atmosphere-521324.mp3" type="audio/mpeg">
</audio>
<button class="playbtn">Play</button>
<input type="range" class="volume" min="0" max="1" step="0.01" value="0.5">
</div>

<!-- Forest -->

<div class="sound-card">
<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">
<p>Forest</p>
<span class="nowplaying">Now Playing</span>
<audio>
<source src="dragon-studio-ambient-pads-loop-01-427398.mp3" type="audio/mpeg">
</audio>
<button class="playbtn">Play</button>
<input type="range" class="volume" min="0" max="1" step="0.01" value="0.5">
</div>

<!-- Ocean -->

<div class="sound-card">
<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">
<p>Ocean</p>
<span class="nowplaying">Now Playing</span>
<audio>
<source src="dragon-studio-ambient-pads-loop-04-427396.mp3" type="audio/mpeg">
</audio>
<button class="playbtn">Play</button>
<input type="range" class="volume" min="0" max="1" step="0.01" value="0.5">
</div>

<!-- Wind -->

<div class="sound-card">
<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">
<p>Wind</p>
<span class="nowplaying">Now Playing</span>
<audio>
<source src="dragon-studio-copyright-free-rain-sounds-331497.mp3" type="audio/mpeg">
</audio>
<button class="playbtn">Play</button>
<input type="range" class="volume" min="0" max="1" step="0.01" value="0.5">
</div>

<!-- Thunder -->

<div class="sound-card">
<img src="https://images.unsplash.com/photo-1490730141103-6cac27aaab94">
<p>Thunder</p>
<span class="nowplaying">Now Playing</span>
<audio>
<source src="dragon-studio-dark-horror-ambient-05-425468.mp3" type="audio/mpeg">
</audio>
<button class="playbtn">Play</button>
<input type="range" class="volume" min="0" max="1" step="0.01" value="0.5">
</div>

</div>

<script>

/* Only one sound plays */

const cards=document.querySelectorAll(".sound-card")

cards.forEach(card=>{

const audio=card.querySelector("audio")
const btn=card.querySelector(".playbtn")
const slider=card.querySelector(".volume")
const now=card.querySelector(".nowplaying")

audio.volume=slider.value

btn.onclick=()=>{

document.querySelectorAll("audio").forEach(a=>{
a.pause()
a.currentTime=0
})

document.querySelectorAll(".playbtn").forEach(b=>{
b.innerText="Play"
})

document.querySelectorAll(".nowplaying").forEach(n=>{
n.style.display="none"
})

audio.play()
btn.innerText="Pause"
now.style.display="block"

}

slider.oninput=()=>{
audio.volume=slider.value
}

})

/* Falling Leaves */

function createLeaf(){

let leaf=document.createElement("div")

leaf.classList.add("leaf")

leaf.innerHTML="🍃"

leaf.style.left=Math.random()*100+"vw"

leaf.style.animationDuration=(Math.random()*5+5)+"s"

document.body.appendChild(leaf)

setTimeout(()=>{

leaf.remove()

},10000)

}

setInterval(createLeaf,500)

</script>

</body>
</html>
