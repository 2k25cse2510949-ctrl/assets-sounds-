<!DOCTYPE html>
<html>

<head>

<title>Ambient Sound Mixer</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:linear-gradient(270deg,#020617,#0f172a,#1e293b);
background-size:600% 600%;
animation:bgMove 15s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
padding:20px;
font-size:40px;
}

.controls{
margin:20px;
}

button{
background:#22c55e;
border:none;
padding:10px 20px;
margin:5px;
border-radius:8px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.search{
padding:10px;
width:250px;
border-radius:8px;
border:none;
margin-bottom:20px;
}

.sound-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:30px;
}

.sound-card{

background:rgba(30,41,59,0.9);
border-radius:15px;
padding:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.6);
transition:0.3s;
}

.sound-card:hover{
transform:scale(1.07);
box-shadow:0 0 20px #22c55e;
}

.sound-card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.sound-card p{
margin:10px 0;
font-weight:bold;
font-size:18px;
}

.volume{
width:100%;
}

.playbtn{
background:#3b82f6;
margin-top:5px;
}

.playbtn:hover{
background:#2563eb;
}

.nowplaying{
color:#22c55e;
font-size:14px;
display:none;
}

</style>

</head>

<body>

<h1>🎧 Ambient Sound Mixer</h1>

<input class="search" placeholder="Search sound..." onkeyup="searchSound()">

<div class="controls">

<button onclick="playAll()">Play All</button>
<button onclick="stopAll()">Stop All</button>

</div>

<div class="sound-container" id="container">

<!-- Rain -->

<div class="sound-card">

<img src="https://images.unsplash.com/photo-1500375592092-40eb2168fd21">

<p>Rain</p>

<span class="nowplaying">Now Playing</span>

<audio loop>

<source src="black_kumuzhi-lofi-ambient-bell-atmosphere-521324.mp3" type="audio/mpeg">

</audio>

<button class="playbtn">Play</button>

<input type="range" class="volume" min="0" max="1" step="0.01" value="0.5">

</div>

<!-- Forest -->

<div class="sound-card">

<img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470">

<p>Forest</p>

<span class="nowplaying">Now Playing</span>

<audio loop>

<source src="dragon-studio-ambient-pads-loop-01-427398.mp3" type="audio/mpeg">

</audio>

<button class="playbtn">Play</button>

<input type="range" class="volume" min="0" max="1" step="0.01" value="0.5">

</div>

<!-- Ocean -->

<div class="sound-card">

<img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e">

<p>Ocean</p>

<span class="nowplaying">Now Playing</span>

<audio loop>

<source src="dragon-studio-ambient-pads-loop-04-427396.mp3" type="audio/mpeg">

</audio>

<button class="playbtn">Play</button>

<input type="range" class="volume" min="0" max="1" step="0.01" value="0.5">

</div>

<!-- Wind -->

<div class="sound-card">

<img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee">

<p>Wind</p>

<span class="nowplaying">Now Playing</span>

<audio loop>

<source src="dragon-studio-copyright-free-rain-sounds-331497.mp3" type="audio/mpeg">

</audio>

<button class="playbtn">Play</button>

<input type="range" class="volume" min="0" max="1" step="0.01" value="0.5">

</div>

<!-- Thunder -->

<div class="sound-card">

<img src="https://images.unsplash.com/photo-1490730141103-6cac27aaab94">

<p>Thunder</p>

<span class="nowplaying">Now Playing</span>

<audio loop>

<source src="dragon-studio-dark-horror-ambient-05-425468.mp3" type="audio/mpeg">

</audio>

<button class="playbtn">Play</button>

<input type="range" class="volume" min="0" max="1" step="0.01" value="0.5">

</div>

</div>

<script>

const cards=document.querySelectorAll(".sound-card")

cards.forEach(card=>{

const audio=card.querySelector("audio")
const btn=card.querySelector(".playbtn")
const slider=card.querySelector(".volume")
const now=card.querySelector(".nowplaying")

audio.volume=slider.value

btn.onclick=()=>{

if(audio.paused){

audio.play()
btn.innerText="Pause"
now.style.display="block"

}else{

audio.pause()
btn.innerText="Play"
now.style.display="none"

}

}

slider.oninput=()=>{

audio.volume=slider.value

}

})

function playAll(){

document.querySelectorAll("audio").forEach(a=>a.play())

}

function stopAll(){

document.querySelectorAll("audio").forEach(a=>a.pause())

}

function searchSound(){

let input=document.querySelector(".search").value.toLowerCase()

document.querySelectorAll(".sound-card").forEach(card=>{

let text=card.querySelector("p").innerText.toLowerCase()

card.style.display=text.includes(input)?"block":"none"

})

}

</script>

</body>

</html>
