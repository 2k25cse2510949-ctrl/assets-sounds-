<!DOCTYPE html>
<html>

<head>
<title>Ambient Sound Mixer</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

h1{
padding:20px;
}

.sound-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:30px;
}

.sound-card{
background:#1e293b;
border-radius:15px;
padding:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
transition:0.3s;
}

.sound-card:hover{
transform:scale(1.05);
}

.sound-card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

.sound-card p{
margin:10px 0;
font-weight:bold;
}

audio{
width:100%;
}

</style>

</head>

<body>
